<style>
* {
  font-family: 'Prompt', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
 display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Prompt', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #eafaf1);
  overflow: hidden;
}

/* วงแสงลอย */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #ff99cc;
  filter: blur(120px);
  top: -100px;
  left: -100px;
  opacity: 0.4;
}

body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #99ffcc;
  filter: blur(120px);
  bottom: -100px;
  right: -100px;
  opacity: 0.4;
}
/* กล่องกลาง */
#lockScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: #ffb6c1;
}

/* ช่องกรอกรหัส */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid #eee;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #ff6699;
  box-shadow: 0 0 0 3px rgba(255, 102, 153, 0.2);
}

/* ปุ่ม */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff4d88, #ff6699);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

/* hover effect */
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255, 77, 136, 0.3);
}

/* กดแล้ว */
button:active {
  transform: scale(0.98);
}
  .gift-box {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 80px auto;
  cursor: pointer;
  transform-style: preserve-3d;
  transform: rotateX(15deg) rotateY(-15deg);
  transition: transform 0.6s ease;
}

.gift-box:hover {
  transform: rotateX(15deg) rotateY(-15deg) scale(1.08);
}

/* ตัวกล่อง */
.box {
  width: 100%;
  height: 100%;
  background: linear-gradient(145deg, #ffc0cb, #ff9bb3);
  border-radius: 12px;
  position: absolute;
  bottom: 0;
  box-shadow: 
    inset -5px -5px 10px rgba(0,0,0,0.1),
    0 10px 20px rgba(0,0,0,0.2);
}

/* ฝา */
.lid {
  width: 100%;
  height: 40px;
  background: linear-gradient(145deg, #ffb6c1, #ff8fab);
  border-radius: 12px 12px 0 0;
  position: absolute;
  top: -25px;
  transition: transform 0.6s ease;
  transform-origin: bottom;
  box-shadow: 0 5px 10px rgba(0,0,0,0.15);
}

/* ริบบิ้น */
.ribbon-vertical {
  position: absolute;
  width: 22px;
  height: 100%;
  background: linear-gradient(to bottom, #ff4d88, #ff1a66);
  left: 50%;
  transform: translateX(-50%);
}

.ribbon-horizontal {
  position: absolute;
  height: 22px;
  width: 100%;
  background: linear-gradient(to right, #ff4d88, #ff1a66);
  top: 45px;
}

/* ตอนเปิด */
.gift-box.open {
  transform: rotateX(10deg) rotateY(-10deg) scale(1.1);
}

.gift-box.open .lid {
  transform: rotateX(-120deg);
}

<!-- 🔒 หน้าใส่รหัส --> 
<div id="lockScreen">
  <h2>Our anniversary</h2>
  <input type="password" id="pass" placeholder=" 4 PIN ">
  <button onclick="checkPass()"> Are you 100% sure ?! </button>
  <p id="error" style="color:red;"></p>
</div>

<!-- 💖 หน้าเซอร์ไพรส์ -->
<div id="main">
  <h1>Click Click</h1>

  <div class="gift-box" onclick="startSurprise()">
    <div class="lid"></div>
    <div class="box"></div>
    <div class="ribbon-vertical"></div>
    <div class="ribbon-horizontal"></div>
  </div>

  <div id="message" style="display:none;">
    ❤️ คิดถึงอะ จุ๊บตูดทีจิ ❤️
  </div>
</div>

<script>
// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "3011";

function checkPass() {
  let input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    
    let main = document.getElementById("main");
    main.style.display = "flex"; // 👈 ใช้ flex เพื่อจัดกลาง
  } else {
    document.getElementById("error").innerText = "ม่ะ ม่ะ ม่ะ ม่ะ ช่ะะะะะ 😜";
  }
}

function startSurprise() {
  document.querySelector(".gift-box").classList.add("open");

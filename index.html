<head>
<meta charset="UTF-8">
<title>For My bibi ❤️</title>

<!-- ✅ เปลี่ยนเป็น Prompt -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  font-family: 'Prompt', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #eafaf1; /* พื้นหลังเขียวอ่อน */
  font-family: 'Prompt', sans-serif;
}

/* การ์ด */
.card {
  width: 220px;
  height: 360px;
  background: #f6fffa;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* ซองจดหมาย */
.envelope {
  width: 120px;
  height: 80px;
  background: #a8e6cf;
  position: relative;
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ฝาซอง */
.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  width: 0;
  height: 0;
  border-left: 60px solid transparent;
  border-right: 60px solid transparent;
  border-bottom: 40px solid #81d4b3;
}

/* จดหมาย */
.letter {
  position: absolute;
  top: -20px;
  font-size: 24px;
  transition: 0.4s;
}

/* hover แล้วจดหมายโผล่ */
.card:hover .letter {
  transform: translateY(-10px);
}

/* ข้อความ */
.text {
  margin-top: 20px;
  color: #4caf7d;
  font-size: 16px;
}

/* ตอนเปิดกล่อง */
.gift-box.open .lid {
  transform: translateY(-60px) rotate(-15deg);
}
</style>
</head>

<body>

<!-- 🔒 หน้าใส่รหัส -->
<div id="lockScreen">
  <h2>Our anniversary</h2>
  <input type="password" id="pass" placeholder=" 4 PIN ">
  <button onclick="checkPass()"> Are you 100% sure ?! </button>
  <p id="error" style="color:red;"></p>
</div>

<!-- 💖 หน้าเซอร์ไพรส์ -->
<div id="main">
  <h1> Click Click </h1>
  <div class="gift-box" onclick="startSurprise()">
  <div class="lid"></div>
  <div class="box"></div>
  <div class="ribbon-vertical"></div>
  <div class="ribbon-horizontal"></div>
  <div id="message">
    ❤️ รักเธอมากนะ อยู่ด้วยกันไปนานๆ เลยนะ ❤️
  </div>
</div>

<script>
// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "3011";

function checkPass() {
  let input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    document.getElementById("error").innerText = " ม่ะ ม่ะ ม่ะ ม่ะ ช่ะะะะะ ";
  }
}

function startSurprise() {
  document.querySelector(".gift-box").classList.add("open");
  document.getElementById("message").style.display = "block";

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>

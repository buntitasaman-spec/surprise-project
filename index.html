<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My bibi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { font-family: 'Prompt', sans-serif; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #ffffff, #eafaf1);
}

/* หน้าแรก */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffb6c1;
}

/* กล่อง */
.card {
  background: rgba(255,255,255,0.9);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
}

/* input + button */
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff4d88;
  color: white;
}

/* หน้า 2 */
#main {
  display: none;
  flex-direction: column;
  align-items: center;
}

/* กล่องของขวัญ */
.gift-box {
  width: 120px;
  height: 120px;
  position: relative;
  margin-top: 30px;
  cursor: pointer;
}

.box {
  width: 100%;
  height: 100%;
  background: pink;
  border-radius: 10px;
}

.lid {
  width: 100%;
  height: 30px;
  background: hotpink;
  position: absolute;
  top: -20px;
  transition: 0.5s;
}

.gift-box.open .lid {
  transform: translateY(-50px) rotate(-20deg);
}
</style>
</head>

<body>

<!-- 🔒 หน้าใส่รหัส --> 
<div id="lockScreen">
  <div class="card">
  <h2>Our anniversary</h2>
  <input type="password" id="pass" placeholder=" 4 PIN ">
  <button onclick="checkPass()"> Are you 100% sure ?! </button>
  <p id="error" style="color:red;"></p>
 </div>
</div>
<!-- 💖 หน้าเซอร์ไพรส์ -->
<div id="main">
  <h1>Click Click</h1>

  <div class="gift-box" onclick="startSurprise()">
    <div class="lid"></div>
    <div class="box"></div>
    <div class="ribbon-vertical"></div>
    <div class="ribbon-horizontal"></div>
  </div>

  <div id="message" style="display:none;">
    ❤️ คิดถึงอะ จุ๊บตูดทีจิ ❤️
  </div>
</div>

<script>
// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "3011";

function checkPass() {
  let input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    
    let main = document.getElementById("main");
    main.style.display = "flex"; // 👈 ใช้ flex เพื่อจัดกลาง
  } else {
    document.getElementById("error").innerText = "ม่ะ ม่ะ ม่ะ ม่ะ ช่ะะะะะ 😜";
  }
}

function startSurprise() {
  document.querySelector(".gift-box").classList.add("open");
  document.getElementById("message").style.display = "block";

  // setInterval(() => {

  //   heart.innerHTML = "❤️";

  //   document.body.appendChild(heart);

  //   setTimeout(() => heart.remove(), 5000);
  // }, 300);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to top, #ffd6e7, #fff);
  text-align: center;
  overflow: hidden;
}

/* หน้าใส่รหัส */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff3366;
  color: white;
}

/* หน้าเซอร์ไพรส์ */
#main {
  display: none;
}

#gift {
  font-size: 80px;
  margin-top: 100px;
  cursor: pointer;
}

#message {
  display: none;
  font-size: 28px;
  color: #ff3366;
  margin-top: 20px;
}

/* หัวใจลอย */
.heart {
  position: fixed;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔒 หน้าใส่รหัส -->
<div id="lockScreen">
  <h2>ใส่รหัสก่อนนะ 😊</h2>
  <input type="password" id="pass" placeholder="รหัสคืออะไรน้าา">
  <button onclick="checkPass()">เข้าเลย ❤️</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- 💖 หน้าเซอร์ไพรส์ -->
<div id="main">
  <h1>มีอะไรจะให้เธอ 💕</h1>
  <div id="gift" onclick="startSurprise()">🎁</div>
  <div id="message">
    ❤️ รักเธอมากนะ อยู่ด้วยกันไปนานๆ เลยนะ ❤️
  </div>
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "1234";

function checkPass() {
  let input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    document.getElementById("error").innerText = "รหัสไม่ถูกนะ 😜";
  }
}

function startSurprise() {
  document.getElementById("message").style.display = "block";
  document.getElementById("music").play();

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>

<head>
<meta charset="UTF-8">
<title>For My bibi ❤️</title>

<!-- ✅ เปลี่ยนเป็น Prompt -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  font-family: 'Prompt', sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #cffcd3, #67A88D);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* กล่องกลาง */
#lockScreen {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  text-align: center;
  width: 320px;
  animation: fadeIn 0.8s ease;
}

/* animation นุ่ม ๆ */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ช่องกรอกรหัส */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid #eee;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #ff6699;
  box-shadow: 0 0 0 3px rgba(255, 102, 153, 0.2);
}

/* ปุ่ม */
button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff4d88, #ff6699);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255, 77, 136, 0.3);
}

button:active {
  transform: scale(0.98);
}

/* หน้าเซอร์ไพรส์ */
#main {
  display: none;
  text-align: center;
}

#gift {
  font-size: 80px;
  margin-top: 100px;
  cursor: pointer;
  transition: 0.3s;
}

#gift:hover {
  transform: scale(1.1);
}

#message {
  display: none;
  font-size: 26px;
  color: #ff3366;
  margin-top: 20px;
  animation: fadeIn 1s ease;
}

/* หัวใจลอย */
.heart {
  position: fixed;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔒 หน้าใส่รหัส -->
<div id="lockScreen">
  <h2>Our anniversary</h2>
  <input type="password" id="pass" placeholder=" 4 PIN ">
  <button onclick="checkPass()"> Are you 100% sure ?! </button>
  <p id="error" style="color:red;"></p>
</div>

<!-- 💖 หน้าเซอร์ไพรส์ -->
<div id="main">
  <h1> Click Click </h1>
  <div id="gift" onclick="startSurprise()">🎁</div>
  <div id="message">
    ❤️ รักเธอมากนะ อยู่ด้วยกันไปนานๆ เลยนะ ❤️
  </div>
</div>

<script>
// 🔑 เปลี่ยนรหัสตรงนี้
const PASSWORD = "3011";

function checkPass() {
  let input = document.getElementById("pass").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
  } else {
    document.getElementById("error").innerText = "รหัสไม่ถูกนะ 😜";
  }
}

function startSurprise() {
  document.getElementById("message").style.display = "block";

  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
